name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify_files:
    name: Verify Files
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 24
        cache: npm
    - name: Install Packages
      run: npm ci
    - name: Shape packages-versions.json
      run: npm run get-packages-versions
    - name: Lint Files
      run: npm run lint
    - name: Typecheck
      run: npm run typecheck
    - name: Build
      run: npm run build
      env:
        GITHUB_TOKEN: ${{ github.token }}
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ hashFiles('package-lock.json') }}
    - name: Install Playwright chromium
      run: npx playwright install --with-deps chromium
    - name: Start Next app
      run: npm run start -- -p 3010 &
      env:
        NEXT_PUBLIC_ENABLE_PREVIEW_ROUTES: '1'
    - name: Wait for Next app
      run: npx wait-on http://localhost:3010 --timeout 60000
    - name: Verify theme previews are up to date
      run: npm run check-theme-previews
      env:
        BASE_URL: http://localhost:3010
